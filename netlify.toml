# Netlify build configuration.
#
# Mirrors what's set in the Netlify UI, plus an `ignore` rule that fixes
# the cross-directory dependency: events.json lives in the repo root but
# is imported at build time by the React app under web/. Without this,
# Netlify's default "did the base directory change?" check skips the
# build whenever only events.json updates — which is exactly what the
# weekly cron does.

[build]
  base    = "web"
  command = "npm run build"
  # Relative to `base`, NOT to the repo root (Netlify's toml syntax
  # differs from the UI here — UI uses repo-root paths).
  publish = "dist"

  # Always build. The default behaviour skips builds when the base
  # directory hasn't changed, which is wrong for this repo because
  # events.json lives in the root and is imported at build time.
  # `false` exits 1, which Netlify interprets as "do not skip".
  # Build minutes are cheap (free tier is 300/month, each build ~30s).
  ignore  = "false"
