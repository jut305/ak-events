name: Weekly events refresh

on:
  # Every Monday at 14:00 UTC (≈ 6am AKDT in summer, 5am AKST in winter)
  schedule:
    - cron: "0 14 * * 1"
  # Allow a manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run events fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_events.py

      - name: Commit and push if events.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet events.json; then
            echo "No changes to events.json — skipping commit."
          else
            git add events.json
            git commit -m "chore: weekly events refresh"
            git push
          fi
